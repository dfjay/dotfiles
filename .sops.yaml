creation_rules:
  # Shared VPN secrets (UUIDs, hy2 password) — both servers need access
  - path_regex: secrets/vpn-shared\.yaml$
    key_groups:
      - pgp:
          - *yubikey
        age:
          - *yubikey-ssh
          - *mac
          - *mac-age
          - *desktop-age
          - *gandi-age
          - *linode-age

  # Gandi-specific VPN secrets (reality, warp keys)
  - path_regex: secrets/vpn-gandi\.yaml$
    key_groups:
      - pgp:
          - *yubikey
        age:
          - *yubikey-ssh
          - *mac
          - *mac-age
          - *desktop-age
          - *gandi-age

  # Linode-specific VPN secrets (reality, warp keys)
  - path_regex: secrets/vpn-linode\.yaml$
    key_groups:
      - pgp:
          - *yubikey
        age:
          - *yubikey-ssh
          - *mac
          - *mac-age
          - *desktop-age
          - *linode-age

  # Desktop and other secrets
  - path_regex: secrets/secret\.yaml$
    key_groups:
      - pgp:
          - *yubikey
        age:
          - *yubikey-ssh
          - *mac
          - *mac-age
          - *desktop-age

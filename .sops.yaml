creation_rules:
  # Shared secrets (UUIDs, hy2 password) — all servers need access
  - path_regex: secrets/shared\.yaml$
    key_groups:
      - pgp:
          - *yubikey
        age:
          - *yubikey-ssh
          - *mac
          - *mac-age
          - *desktop-age
          - *gandi-age
          - *linode-age
          - *yc-age

  # Gandi-specific secrets (reality, warp keys)
  - path_regex: secrets/gandi-vps\.yaml$
    key_groups:
      - pgp:
          - *yubikey
        age:
          - *yubikey-ssh
          - *mac
          - *mac-age
          - *desktop-age
          - *gandi-age

  # Linode-specific secrets (reality, warp keys)
  - path_regex: secrets/linode-vps\.yaml$
    key_groups:
      - pgp:
          - *yubikey
        age:
          - *yubikey-ssh
          - *mac
          - *mac-age
          - *desktop-age
          - *linode-age

  # YC-specific secrets (reality key)
  - path_regex: secrets/yc-vps\.yaml$
    key_groups:
      - pgp:
          - *yubikey
        age:
          - *yubikey-ssh
          - *mac
          - *mac-age
          - *desktop-age
          - *yc-age

  # Desktop and other secrets
  - path_regex: secrets/secret\.yaml$
    key_groups:
      - pgp:
          - *yubikey
        age:
          - *yubikey-ssh
          - *mac
          - *mac-age
          - *desktop-age
